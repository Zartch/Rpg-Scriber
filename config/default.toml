# RPG Scribe — default system configuration
# These values are used as the base; they can be overridden by
# campaign TOML files and environment variables.

[listener]
chunk_duration_s = 10.0
silence_threshold_s = 1.5
short_silence_threshold_s = 0.5
min_chunk_duration_s = 0.5
sample_rate = 48000
channels = 1
sample_width = 2
vad_aggressiveness = 2

[transcriber]
# ── Selección de transcriptor ────────────────────────────────────────────────
# Descomenta el bloque del transcriptor que quieras usar y comenta el otro.
# También se puede sobreescribir con: RPG_SCRIBE_TRANSCRIBER_TYPE=faster-whisper
# ────────────────────────────────────────────────────────────────────────────

# ── Opción A: OpenAI API (nube, sin instalación extra) ───────────────────────
# transcriber_type = "openai"
# model = "gpt-4o-transcribe"   # o "whisper-1"
# api_timeout_s = 30.0
# max_concurrent_requests = 4
# queue_max_size = 100
# max_retries = 3
# retry_base_delay_s = 1.0

# ── Opción B: Faster-Whisper (local, fine-tuneable) ──────────────────────────
# Requiere: pip install -e ".[local]"
transcriber_type = "faster-whisper"
local_model_size = "large-v3"   # tiny | base | small | medium | large-v3
device = "auto"                 # auto | cpu | cuda
compute_type = "int8"           # float16 (GPU) | int8 (CPU, más rápido y compatible)
prompt_hint = ""                # pista inicial para el modelo (mejora precisión)

# ── Ajustes comunes ──────────────────────────────────────────────────────────
language = "es"
audio_filter_enabled = true
audio_filter_rms_threshold = 200.0
audio_filter_speech_ratio_threshold = 0.15
audio_filter_vad_aggressiveness = 3
post_filter_enabled = true
post_filter_max_words_per_second = 8.0
# Save discarded audio chunks as WAV files for analysis (dev only, "" = disabled)
audio_debug_log_dir = "logs/audio/discarded"
# Verbose per-chunk logs (INFO level); false → per-chunk logs go to DEBUG
verbose_logging = false

[summarizer]
model = "claude-sonnet-5"
max_tokens = 4096
api_timeout_s = 60.0
max_retries = 3
retry_base_delay_s = 1.0
# Entity extraction frequency: run every N summary updates (0 = only at session finalization)
extraction_every_n_updates = 0

[tts]
enabled = true
provider = "openai"
voice = "nova"
model = "tts-1"
cache_dir = "data/tts_cache"

[web]
host = "127.0.0.1"
port = 8000
transcriptions_max_items = 5000
feed_max_items = 1000

[database]
path = "rpg_scribe.db"
