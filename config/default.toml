# RPG Scribe — default system configuration
# These values are used as the base; they can be overridden by
# campaign TOML files and environment variables.

[listener]
chunk_duration_s = 10.0
silence_threshold_s = 1.5
short_silence_threshold_s = 0.5
min_chunk_duration_s = 0.5
sample_rate = 48000
channels = 1
sample_width = 2
vad_aggressiveness = 2

[transcriber]
model = "gpt-4o-transcribe"
language = "es"
api_timeout_s = 30.0
max_concurrent_requests = 4
queue_max_size = 100
max_retries = 3
retry_base_delay_s = 1.0
prompt_hint = ""
local_model_size = "medium"
device = "auto"
compute_type = "float16"
audio_filter_enabled = true
audio_filter_rms_threshold = 200.0
audio_filter_speech_ratio_threshold = 0.15
audio_filter_vad_aggressiveness = 3
post_filter_enabled = true
post_filter_max_words_per_second = 6.0
# Save discarded audio chunks as WAV files for analysis (dev only, "" = disabled)
audio_debug_log_dir = ""

[summarizer]
update_interval_s = 120.0
max_pending_transcriptions = 20
model = "claude-sonnet-4-20250514"
max_tokens = 4096
api_timeout_s = 60.0
max_retries = 3
retry_base_delay_s = 1.0

[web]
host = "127.0.0.1"
port = 8000
transcriptions_max_items = 5000
feed_max_items = 1000

[database]
path = "rpg_scribe.db"
