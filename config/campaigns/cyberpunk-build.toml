[campaign.custom_instructions]
text = """
- Esta campana es una sesion de pre-juego y decision de build, no una aventura activa.
- Prioriza capturar argumentos utiles para decidir el personaje de Miquel.
- Separa claramente propuestas serias de bromas internas.
- Si hay consenso o decision final, dejalo explicito con pros y contras.
- Mantener tono informal y natural del grupo sin perder informacion clave.
- El transcriptor trascribe cosas sin sentido a veces, si algo no tiene sentido simplemente descarta
"""
