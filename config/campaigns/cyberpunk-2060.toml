[campaign]
id = "cyberpunk-2060-nacimiento-perfeccion"
name = "Cyberpunk 2060: Nacimiento de la Perfeccion"
game_system = "Cyberpunk RED"
language = "es"
description = "Night City, 2060. La contaminacion de la explosion de la torre Arasaka ha sido limpiada y la ciudad empieza a reconstruirse. Pero no es la vieja Night City la que resurge: Aeterna Biotics, una startup agresiva que promete inmortalidad, esta transformando la ciudad desde dentro. Su lema: \"La carne es un lastre; nosotros somos la evolucion\". Mientras las megas tradicionales luchan por no quedar obsoletas, los jugadores viven la metamorfosis de Night City hacia algo que podria ser el futuro de Cyberpunk 2077... o no."
campaign_summary = """
# CYBERPUNK 2060: NACIMIENTO DE LA PERFECCIÓN
## Resumen Global de Campaña

### PRÓLOGO: LA PLAZA DE WATSON

En el año 2060, Night City emerge de las cenizas de la explosión de la torre Arasaka, transformándose bajo la influencia de Aeterna Biotics, una startup agresiva que promete inmortalidad con su lema: "La carne es un lastre; nosotros somos la evolución". Mientras las megacorporaciones tradicionales luchan por no quedar obsoletas, cuatro individuos se encuentran en una plaza de Watson que cambiará sus vidas para siempre.

Elara "Nix" Navarro, fixer experta en información; Vektor, netrunner parco de palabras con precisión mecánica; Canal, técnico vivaracho con carácter especial; y Tira, mercenaria europea de identidad oculta, convergen en el momento exacto en que Aeterna instala una antena blanca en la plaza. El intercambio de un disco de datos entre nómadas y un fixer se convierte en catástrofe cuando el nodo de silencio se activa.

Durante once minutos y cincuenta y seis segundos de silencio absoluto, la plaza se transforma: el polímero blanco reemplaza el metal corroído, las personas se disuelven en charcos de cristal líquido, y solo sobreviven nueve individuos. Los protagonistas experimentan visiones de eventos pasados - accidentes manipulados, explosiones en Panamá, asesinatos corporativos - mientras barras de progreso aparecen sobre todos los presentes, llegando al 12% para los supervivientes.

### ACTO I: LÍNEAS VERDES EN LA TERCERA CAPA

El despertar revela que algo los conecta: líneas verdes visibles solo en la tercera capa de la Red unen las mentes de los supervivientes. Vektor descubre que estos vínculos no fueron creados por Aeterna, sino por una entidad protectora desconocida. Cuando recreaciones digitales del niño de la plaza intentan infiltrarse, el grupo comprende que están siendo cazados sistemáticamente.

Sena, la nómada del disco, les revela la existencia de una red de resistencia liderada por Ekaterina, una mujer elegante que vive en una mansión en las montañas de Westbrook. En este refugio, rodeados de más de cincuenta personas afectadas por Aeterna, los protagonistas descubren verdades devastadoras sobre sus pasados: la madre de Vektor co-creó software de control de tráfico que Aeterna utilizó para asesinar mediante accidentes "naturales"; Canal perdió familia en un carguero atacado en 2054; y las historias de todos están entrelazadas por una conspiración que se extiende décadas atrás.

Sierra, el netrunner de Ekaterina, revela que un firewall sofisticado - posiblemente obra de Rache Bartmoss o una IA similar - los protegió del nodo de silencio. Las líneas verdes también conectan con agentes infiltrados: un ejecutivo corporativo y un fixer en Pacífica, sugiriendo una red más amplia de resistencia.

### ACTO II: REVELACIONES FAMILIARES Y TRAICIONES

La investigación lleva al grupo a los Yermos, donde los Aldecaldos revelan que Elías Thorn, un limpiador de Aeterna, se les adelantó preguntando por el disco de John Trash. Paralelamente, Elara es arrestada por la NCPD con cargos imposibles, enfrentándose a un falso abogado que ofrece intercambiar los discos por su libertad.

Mientras tanto, las líneas familiares se complican dramáticamente. Canal revela a Sena que él también perdió familia en el mismo carguero de 2054, y en una confesión explosiva - literalmente, con bombas colocadas para forzar la atención - le dice que cree que es su hijo y que la persona que buscan es su madre. Kael, el hermano guardaespaldas de Sena, admite haber manipulado la información para seguir dos líneas de investigación paralelas.

La violencia familiar estalla: los hermanos se enfrentan brutalmente, con Kael utilizando sedantes para incapacitar a Sena cuando la verdad la abruma. El intento de reconciliación de Canal fracasa completamente, dejando al grupo dividido y a las relaciones personales fracturadas.

Vektor, procesando información con frialdad creciente, conecta los puntos finales: Tira es en realidad Alina Falkenberg, hija de Erik Falkenberg, el arquitecto involuntario de las antenas de Aeterna. Su desaparición de todos los registros a los 16 años, sus implantes europeos y su presencia en la plaza confirman que ella también es una pieza clave en la conspiración.

### ACTO III: EL LIMPIADOR Y LA CONVERGENCIA

Elías Thorn contacta directamente con Tira en su apartamento, revelándose como más que un simple empleado de Aeterna. Con un pendrive que contiene operaciones de limpieza sistemáticas, demuestra conocer los patrones de eliminación que afectaron a todas las familias del grupo. Las "Fases" documentan la eliminación de los Falkenberg, los padres de Tira, el carguero donde murieron las familias nómadas, y las limpiezas adicionales que incluyen a la madre de Vektor.

El pendrive señala la ubicación del tercer disco en Pacífica, pero también revela nombres desconocidos como Marek Stroot y Lisa Macinon, sugiriendo más supervivientes conectados por las líneas verdes. Cuando el grupo sigue esta pista a una factoría abandonada de Militech, activan un generador que desencadena algo imprevisto.

### ACTO IV: BUCLES TEMPORALES Y REALIDADES FRACTURADAS

La activación del generador los devuelve al evento original de la plaza de Watson, pero en una realidad alterada. Esta vez despiertan con barras de progreso al 88%, sin las líneas verdes protectoras. Vektor ejerce su libre albedrío atacando a los agentes de Aeterna, cambiando el curso de los eventos y demostrando que pueden resistir la manipulación.

El refugio de los hermanos nómadas revela inconsistencias inquietantes: la distribución ha cambiado, documentos cruciales han desaparecido, y Sena y Kael muestran lagunas de memoria específicas sobre Ekaterina y Sierra. Sin embargo, sus recuerdos de la simulación permanecen intactos, creando una dissonancia entre experiencia vivida y realidad física.

En esta realidad fracturada, el disco de John Trash se descifra completamente, revelando ocho archivos bajo "Jurassic Legacy 42-45" que documentan las conexiones entre los Falkenberg, Eurasia Biotechnics, rutas de Panamá, y las verdaderas redes de poder detrás de Aeterna.

### ACTO V: FISURAS Y CONFRONTACIONES

La tensión acumulada explota en violencia cuando Vektor vuelve a mencionar los implantes de Tira. El enfrentamiento escala hasta que Canal interviene con su implante térmico, dejando a la mercenaria gravemente herida. Los hermanos nómadas, profundamente perturbados por la violencia en su hogar, abandonan el búnker tras reprochar los métodos del grupo.

Tira, recuperándose de sus heridas, se separa del grupo para continuar su investigación en solitario. Su encuentro posterior con Elías Thorne revela que él es el noveno superviviente de los nodos de silencio, ex-agente infiltrado de Eurasia Biotechnics que propone una alianza contra la fracción eliminadora de Aeterna.

Las revelaciones finales conectan todos los hilos: la familia de Tira desarrolló la tecnología base de las antenas, los padres fueron eliminados al descubrir el uso de su trabajo, y una red de vigilancia electromagnética basada en la frecuencia 71/56 envuelve toda Night City como un sistema de control constante.

### ESTADO ACTUAL: CONVERGENCIA PELIGROSA

Mientras Canal descifra patrones ocultos en las anotaciones de Sena que revelan la red de vigilancia de Aeterna, los supervivientes se preparan para un encuentro crucial en Heywood. Las fisuras entre simulación y realidad se amplían, revelando que la manipulación de Aeterna trasciende lo digital para afectar la naturaleza misma del tiempo y la memoria.

Node 56, reducido a tres miembros tras la partida de Tira, se enfrenta a verdades devastadoras: sus historias familiares están más entrelazadas de lo imaginado, Aeterna opera una red de control que permea toda la ciudad, y la distinción entre lo real y lo digital se difumina bajo el polímero blanco de la evolución prometida.

En las calles de Night City, donde las antenas blancas proyectan su silencio aséptico sobre el carbón y el acero, los supervivientes descubren que son tanto cazadores como presas en una conspiración que conecta el pasado digital prohibido con un futuro posthumano incierto. La pregunta fundamental permanece: ¿están haciendo exactamente lo que Aeterna quiere que hagan, o existe una genuina posibilidad de resistencia en este mundo donde la carne se convierte en lastre y la humanidad en algoritmo?
"""

