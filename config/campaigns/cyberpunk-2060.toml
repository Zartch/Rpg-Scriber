[campaign]
id = "cyberpunk-2060-nacimiento-perfeccion"
name = "Cyberpunk 2060: Nacimiento de la Perfeccion"
game_system = "Cyberpunk RED"
language = "es"
description = "Night City, 2060. La contaminacion de la explosion de la torre Arasaka ha sido limpiada y la ciudad empieza a reconstruirse. Pero no es la vieja Night City la que resurge: Aeterna Biotics, una startup agresiva que promete inmortalidad, esta transformando la ciudad desde dentro. Su lema: \"La carne es un lastre; nosotros somos la evolucion\". Mientras las megas tradicionales luchan por no quedar obsoletas, los jugadores viven la metamorfosis de Night City hacia algo que podria ser el futuro de Cyberpunk 2077... o no."
campaign_summary = """
## Cyberpunk 2060: Nacimiento de la Perfección
### Resumen Global de Campaña

En el Night City de 2060, donde la pulcritud aséptica de Aeterna Biotics compite con los últimos vestigios del cyberpunk clásico, un grupo de edgerunners se ha visto arrastrado hacia los secretos más oscuros de la corporación que promete la inmortalidad.

### El Descubrimiento

Todo comenzó cuando Tira, una mercenaria de origen europeo con implantes de tecnología avanzada, obtuvo información sobre un disco de datos de un contacto. Lo que inicialmente parecía un trabajo rutinario se reveló como una trampa cuidadosamente orquestada: quien le proporcionó la información esperaba que Aeterna apareciera para capturar a cualquiera que fuera tras el disco.

En el despacho de Elara Navarro, el grupo descubrió que el disco contenía archivos fragmentarios bajo la carpeta raíz "John Trash" - un nombre que Vektor reconoció inmediatamente. Los datos incluían mapas de Viena, logs de gestión de tráfico de 2023, procesos cifrados complejos y coordenadas dispersas. Sin embargo, la información estaba incompleta: claramente se necesitaban más discos para acceder al contenido completo.

### La Revelación de Sena

La situación se complicó dramáticamente cuando la misteriosa nómada que había aparecido previamente en un callejón regresó con una nueva identidad. Presentándose como Sena y acompañada por su guardaespaldas Kael, reveló ser mucho más que una simple vagabunda. Su conocimiento íntimo de Aeterna y su reacción visceral al mencionar la corporación sugieren una historia personal dolorosa.

Sena desveló información crucial: el disco contiene datos sobre los orígenes de Aeterna - lo que ella denomina su "semilla" o "germen" en Eurasia. Esta información, distribuida en sucesos aparentemente inconexos ocurridos en Austria, Night City, Panamá y otras ciudades, podría desencadenar algo que Aeterna desesperadamente quiere mantener oculto.

### El Misterio de la Conexión

Más inquietante aún, Sena detectó que algo une al grupo en la Capa 3 de la Red - una vinculación digital que ellos mismos no comprenden pero que podría representar un peligro mortal. Para ayudar a Vektor a investigar esta conexión, le entregó un dispositivo de almacenamiento con la advertencia estricta de no conectarlo a ninguna red.

### Estado Actual

El grupo se encuentra ahora en posesión del primer disco de una serie que aparentemente contiene los secretos fundacionales de Aeterna Biotics. Sena confirma conocer la ubicación del segundo disco, aunque el paradero del tercero permanece en las sombras. La advertencia es clara: el simple conocimiento de la existencia de estos discos ya los ha marcado como objetivos de Aeterna.

Mientras Elara se recupera de su experiencia en la zona de silencio de Aeterna sin aparentes secuelas físicas, las tensiones dentro del grupo aumentan. La sospecha de Vektor hacia los implantes avanzados de Tira, la misteriosa conexión que los une en la Capa 3, y la solicitud de Sena para una conversación privada con la mercenaria sugieren que los secretos personales pronto colisionarán con la conspiración corporativa más amplia.

En las calles de Night City, donde las antenas blancas de Aeterna proyectan su silencio aséptico sobre los barrios de carbón y acero, el grupo se adentra en un juego mortal donde la información es poder, la paranoia es supervivencia, y los secretos del pasado pueden determinar el futuro de la humanidad misma.
"""

[[campaign.locations]]
name = "Afterlife"
description = "Bar iconico de mercenarios y edgerunners. Punto de encuentro para trabajos y contactos."

[[campaign.locations]]
name = "Centro Corporativo (Nucleo de Cristal)"
description = "Zona de exclusion llena de gruas silenciosas y andamios de luz. Drones de Aeterna proyectan laseres sobre esqueletos de acero mientras el biopolimero 'crece' sobre las estructuras como coral blanco. Un muro sonico separa este distrito: de un paso a otro, el caos de la ciudad se apaga y solo queda un zumbido de baja frecuencia."

[[campaign.locations]]
name = "Heywood"
description = "Vigilancia Emocional. Los drones de Aeterna escanean ventanas de apartamentos. La musica latina se corta por anuncios holograficos que ofrecen 'Mejoras Familiares' para ti y tus seres queridos."

[[campaign.locations]]
name = "Pacifica"
description = "El Olvido Digital. Zonas de 'muerte de senal' donde aparecen cuerpos catatonicos tirados en cualquier lado. No estan muertos, o si, pero yacen inertes y ninguno se ha recuperado. Hay zonas sin ningun tipo de cobertura, como un agujero negro."

[[campaign.locations]]
name = "Santo Domingo"
description = "Desmantelamiento. Las viejas industrias ruidosas estan siendo desmanteladas por gruas silenciosas que instalan paneles de biopolimero. Es el lugar donde mejor se ve el choque entre el acero viejo y el cristal nuevo."

[[campaign.locations]]
name = "Watson"
description = "El Distrito Enrarecido. Entre fabricas oxidadas aparecen 'Nodos de Silencio': cruzas una calle y el ruido desaparece, no escuchas coches ni gritos, solo susurros de personas muy proximas a ti."

[[campaign.locations]]
name = "Viena"
description = "Ciudad europea cuyos mapas aparecen en los archivos del disco de John Trash, con información en alemán relacionada con los orígenes de Aeterna."

[[campaign.locations]]
name = "Austria"
description = "País donde ocurrieron sucesos aparentemente inconexos relacionados con la información sobre los orígenes de Aeterna distribuida en los discos."

[[campaign.locations]]
name = "Panamá"
description = "Ubicación donde ocurrieron eventos conectados con la información sobre los orígenes de Aeterna."

[[campaign.locations]]
name = "Capa 3 de la Red"
description = "Nivel profundo de la red donde existe una conexión misteriosa que une al grupo de alguna manera desconocida."

