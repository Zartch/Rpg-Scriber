[campaign]
id = "cyberpunk-2060-nacimiento-perfeccion"
name = "Cyberpunk 2060: Nacimiento de la Perfeccion"
game_system = "Cyberpunk RED"
language = "es"
description = "Night City, 2060. La contaminacion de la explosion de la torre Arasaka ha sido limpiada y la ciudad empieza a reconstruirse. Pero no es la vieja Night City la que resurge: Aeterna Biotics, una startup agresiva que promete inmortalidad, esta transformando la ciudad desde dentro. Su lema: \"La carne es un lastre; nosotros somos la evolucion\". Mientras las megas tradicionales luchan por no quedar obsoletas, los jugadores viven la metamorfosis de Night City hacia algo que podria ser el futuro de Cyberpunk 2077... o no."
campaign_summary = """
## Cyberpunk 2060: Nacimiento de la Perfección
### Resumen Global de Campaña

En el Night City de 2060, la limpieza de la contaminación de la torre Arasaka ha dado paso a una transformación más profunda y siniestra. Aeterna Biotics, una startup que promete inmortalidad bajo el lema "La carne es un lastre; nosotros somos la evolución", está metamorfoseando la ciudad desde sus cimientos. Lo que comenzó como un simple trabajo de recuperación de datos se ha revelado como el epicentro de una conspiración que conecta el pasado digital prohibido con un futuro posthumano.

### El Despertar en la Plaza

Todo comenzó en una plaza de Watson transformada por Aeterna, donde el grupo presenció un evento de "asimilación" que licuó a cientos de personas en charcos de cristal líquido. Tira, una mercenaria europea con implantes avanzados, había obtenido un disco de datos de un contacto que resultó ser una trampa: esperaban que Aeterna apareciera para capturar a quien fuera tras la información. Pero algo interfirió con el proceso: los protagonistas despertaron cuando otros se convirtieron en sustancia cristalina.

### Los Discos de John Trash

El disco contenía archivos fragmentarios bajo la carpeta "John Trash" - un nombre que Vector reconoció como un contacto nómada. Los datos incluían mapas de Viena, logs de gestión de tráfico de 2023, y coordenadas dispersas, pero la información estaba incompleta, distribuida en tres discos para acceder al contenido completo. Estos discos contienen los secretos fundacionales de Aeterna - lo que Sena denomina su "semilla" o "germen" en Eurasia.

### Revelaciones de Ekaterina

La misteriosa Ekaterina, contacto de Sena, reveló poseer el segundo disco y conocimiento crucial sobre los orígenes de Aeterna. Su netrunner de confianza descubrió que una IA anterior al DataCrash llamada Cerberus fue quien protegió al grupo del evento de asimilación, pero murió cuando "algo le frió el cerebro" durante la investigación. Ekaterina advierte que los nodos de silencio no son aleatorios - están apareciendo en lugares frecuentados por personas específicas que Aeterna busca.

### La Conexión Oculta

Más inquietante aún, existe una vinculación digital que une al grupo en la Capa 3 de la Red - líneas verdes que Vector puede rastrear pero cuyo propósito permanece en misterio. Esta conexión, que los miembros no comprenden completamente, podría representar tanto una ventaja como un peligro mortal en su conflicto con Aeterna.

### Secretos Familiares y Corporativos

La investigación de Vector en los archivos de Ekaterina reveló una verdad personal devastadora: su madre, empleada de Danger Gal, diseñó software que fue usado sin su conocimiento para asesinar a los Falkenberg en Viena mediante control de tráfico. Cuando denunció el uso indebido, orquestaron su muerte. Erik Falkenberg, víctima del software, resulta ser el arquitecto involuntario de los primeros nodos de silencio. Su hija Alina desapareció de todos los registros a los 16 años y ahora tendría 24.

### La Caza Sistemática

Elara experimentó en primera persona la metodología de Aeterna cuando fue arrestada con cargos completamente fabricados - 28 asesinatos, 14 robos con violencia, y decenas de otros delitos incluyendo multas de tráfico sin poseer vehículo. El interrogatorio reveló que Aeterna busca específicamente los discos y la ubicación de Ekaterina, empleando tanto métodos "soft" como chantaje legal antes de recurrir a medidas más definitivas.

### Tecnología Más Allá de la Comprensión

El rescate de Sena del edificio controlado por Arasaka expuso tecnologías que desafían la realidad conocida. Los agentes de trajes blancos inmaculados sufrieron transformaciones imposibles: uno se desvaneció completamente, el otro se cristalizó con polímero orgánico antes de descomponerse en líquido en menos de quince segundos. El hecho de que uno emergiera posteriormente del edificio sugiere que estas manifestaciones trascienden las explicaciones convencionales.

### La Ciudad Transformada

Night City está experimentando una metamorfosis arquitectónica y social. Las zonas higienizadas por Aeterna - recubiertas de polímero orgánico blanco que regula luz, sonido y contaminación - contrastan con las áreas tradicionales de carbón y acero. Las corporaciones clásicas (Militech, Arasaka, Petrochem) han sido relegadas a las zonas "sucias", mientras Aeterna y sus afiliadas ocupan el corazón limpio de la ciudad. Los ciudadanos de estas áreas muestran comportamientos asépticos y respuestas planas, como si estuvieran siendo gradualmente procesados.

### Conexiones Peligrosas

La aparición de Elías Thorn - catalogado por Elara como "riesgo 7, valor 8" e involucrado en operaciones de limpieza de información - revela que Aeterna ha infiltrado o cooptado elementos de otras organizaciones. Su conocimiento específico del contenido de los discos y su búsqueda activa de instalaciones antiguas de Militech sugiere una red de inteligencia sofisticada que precede a los eventos actuales.

### La Resistencia en las Sombras

Ekaterina y Olga representan algún tipo de red de resistencia con recursos considerables: la misteriosa abogada pudo liberar a Elara de una situación aparentemente imposible, explicando críticamente que "ellos tienen las suyas, nosotros las nuestras." Esta organización parece comprender que Aeterna busca algo específico del grupo, algo que los mantiene vivos mientras la corporación determina su utilidad.

### Estado Actual: En el Ojo del Huracán

El grupo se encuentra ahora en posesión de dos de los tres discos críticos, pero completamente marcados por Aeterna como objetivos de alta prioridad. Las advertencias de Olga resuenan con inquietante claridad: Aeterna quiere algo de cada uno de ellos - Vector, Canal, Elara, y los hermanos nómadas - y mientras no determine qué es exactamente, seguirán vivos pero constantemente acechados.

Los nodos de silencio continúan apareciendo en ubicaciones estratégicas, las desapariciones se cuentan por cientos, y las líneas verdes en la Capa 3 de la Red sugieren que el conflicto trasciende lo meramente físico. Vector debe desentrañar el misterio de Polizón y su conexión con las IA prohibidas, mientras Elara navega una red de contactos donde la lealtad se mide en niveles de riesgo y valor.

En las calles de Night City, donde las antenas blancas de Aeterna proyectan su silencio aséptico sobre los vestigios del cyberpunk clásico, los protagonistas se han convertido en peones conscientes de un juego donde la información es poder, la paranoia es supervivencia, y los secretos del pasado pueden determinar si la humanidad evoluciona hacia la perfección prometida por Aeterna o hacia algo completamente inimaginable.

El tercer disco permanece en las sombras, las IA antiguas despiertan de su exilio digital, y la transformación de Night City acelera hacia un punto de no retorno. En este nuevo mundo donde la línea entre lo real y lo artificial se difumina bajo el polímero blanco de la evolución, cada decisión puede inclinar la balanza entre la trascendencia y la extinción.
"""

[[campaign.locations]]
name = "Afterlife"
description = "Bar iconico de mercenarios y edgerunners. Punto de encuentro para trabajos y contactos."

[[campaign.locations]]
name = "Austria"
description = "País donde ocurrieron sucesos aparentemente inconexos relacionados con la información sobre los orígenes de Aeterna distribuida en los discos."

[[campaign.locations]]
name = "Bar seguro"
description = "Establecimiento donde el grupo se refugió tras los eventos de la plaza, con reservados privados"

[[campaign.locations]]
name = "Capa 3 de la Red"
description = "Nivel profundo de la red donde existe una conexión misteriosa que une al grupo de alguna manera desconocida."

[[campaign.locations]]
name = "Centro Corporativo (Nucleo de Cristal)"
description = "Zona de exclusion llena de gruas silenciosas y andamios de luz. Drones de Aeterna proyectan laseres sobre esqueletos de acero mientras el biopolimero 'crece' sobre las estructuras como coral blanco. Un muro sonico separa este distrito: de un paso a otro, el caos de la ciudad se apaga y solo queda un zumbido de baja frecuencia."

[[campaign.locations]]
name = "Despacho de Elara"
description = "Lugar donde Canal trabaja en crear el conector para el disco y donde el grupo se reúne para analizarlo"

[[campaign.locations]]
name = "Heywood"
description = "Vigilancia Emocional. Los drones de Aeterna escanean ventanas de apartamentos. La musica latina se corta por anuncios holograficos que ofrecen 'Mejoras Familiares' para ti y tus seres queridos."

[[campaign.locations]]
name = "Night City"
description = "Ciudad principal donde transcurren los eventos, con múltiples distritos afectados por la presencia de Aeterna"

[[campaign.locations]]
name = "Pacifica"
description = "El Olvido Digital. Zonas de 'muerte de senal' donde aparecen cuerpos catatonicos tirados en cualquier lado. No estan muertos, o si, pero yacen inertes y ninguno se ha recuperado. Hay zonas sin ningun tipo de cobertura, como un agujero negro."

[[campaign.locations]]
name = "Panamá"
description = "Ubicación donde ocurrieron eventos conectados con la información sobre los orígenes de Aeterna."

[[campaign.locations]]
name = "Plaza de mercado transformada"
description = "Plaza en Watson donde ocurrió el evento de Aeterna, transformada de metal corroído a paneles blancos pulcros con charcos de cristal líquido"

[[campaign.locations]]
name = "Santo Domingo"
description = "Desmantelamiento. Las viejas industrias ruidosas estan siendo desmanteladas por gruas silenciosas que instalan paneles de biopolimero. Es el lugar donde mejor se ve el choque entre el acero viejo y el cristal nuevo."

[[campaign.locations]]
name = "Viena"
description = "Ciudad europea cuyos mapas aparecen en los archivos del disco de John Trash, con información en alemán relacionada con los orígenes de Aeterna."

[[campaign.locations]]
name = "Watson"
description = "El Distrito Enrarecido. Entre fabricas oxidadas aparecen 'Nodos de Silencio': cruzas una calle y el ruido desaparece, no escuchas coches ni gritos, solo susurros de personas muy proximas a ti."

