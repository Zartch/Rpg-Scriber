entity_type = "technology"
description = "Software diseñado por la madre de Vector para Danger Gal que fue desviado por Aeterna para asesinar a los Falkenberg mediante control de tráfico"

[[campaign.entities]]
name = "Tercer disco de datos"
entity_type = "item"
description = "Tercer disco de información sobre Aeterna que permanece perdido según Sena."

[[campaign.entities]]
name = "Jurassic Legacy 42-45"
entity_type = "item"
description = "Conjunto de ocho archivos contenidos en el disco recuperado con información sobre Falkenberg, Uchtdorf, Goscode, rutas de Panamá, Eurasia Biotechnics, mensaje de BART, Aldecaldos, IASTORN y NetWatch"

[[campaign.entities]]
name = "Goscode"
entity_type = "technology"
description = "Elemento mencionado en los archivos Jurassic Legacy del que se tiene poca información específica"

[[campaign.entities]]
name = "BART"
entity_type = "other"
description = "Destinatario del mensaje de audio de la madre de Minta contenido en los archivos del disco"

[[campaign.entities]]
name = "IASTORN"
entity_type = "organization"
description = "Organización mencionada en los archivos Jurassic Legacy junto con NetWatch"

[[campaign.entities]]
name = "NetWatch"
entity_type = "organization"
description = "Organización de vigilancia de la red mencionada en los archivos del disco"

[[campaign.entities]]
name = "Burst_codec"
entity_type = "technology"
description = "Archivo que desaparece misteriosamente de todos los dispositivos mientras el terminal de Vektor funciona al máximo"

[[campaign.entities]]
name = "Madre de Minta"
entity_type = "npc"
description = "Persona que dejó un mensaje de audio dirigido a BART contenido en los archivos del disco"

[[campaign.entities]]
name = "Familia de Tira"
entity_type = "faction"
description = "Familia que según Thorne puso los cimientos tecnológicos de las antenas que Aeterna usa como nodos de silencio y fueron asesinados al descubrir el uso de su trabajo"

[[campaign.entities]]
name = "Fracción eliminadora de Aeterna"
entity_type = "faction"
description = "Facción dentro de Aeterna que según Thorne busca eliminar a los supervivientes para limpiar su pasado corporativo"

[[campaign.entities]]
name = "Frecuencia 71/56"
entity_type = "technology"
description = "Patrón descubierto por Canal en la libreta de Sena donde el número 71 ha sido sustituido por 56, revelando una frecuencia de comunicación que permea Night City"

[[campaign.entities]]
name = "Red de vigilancia de Aeterna"
entity_type = "technology"
description = "Sistema de vigilancia electromagnética constante que envuelve Night City basado en la frecuencia descubierta por Canal"

