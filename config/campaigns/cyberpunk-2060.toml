[campaign.custom_instructions]
text = """
== LINEA TEMPORAL ==
- Ano 2060. Post-contaminacion de la explosion de la torre Arasaka. Pre-Cyberpunk 2077.
- El mundo y pasado es el canon: Cyberpunk 2020, Firestorms, Cyberpunk RED.
- Night City empieza a construirse tal como la vemos en Cyberpunk 2077 y Edgerunners, o quiza evolucione hacia otro sitio.
- Todo lo que respecta a NPCs, corporaciones y gobierno es exactamente el oficial de 2060, EXCEPTO lo relacionado con Aeterna Biotics.

== AETERNA BIOTICS ==
- Startup agresiva que vende inmortalidad, no armas. Lema: "La carne es un lastre; nosotros somos la evolucion".
- Clinicas: cubos de cristal blanco en esquinas mugrientas de Heywood o Watson. Huelen a clinica de lujo en medio de un vertedero.
- Muchos ciudadanos convertidos a su "fe/dogma": prometen vida y recuerdos eternos, cuerpos mejorados, perfectos, tecnologia e implantes finos, limpios y pulcros.
- Antenas blancas de Aeterna por toda la ciudad: nadie ha conseguido hackearlas, su pintura repele grafitis, si alguien intenta vandalizar una la NCPD aparece de inmediato y no hace preguntas.

== LA RED: 3 LAYER ==
- La Red se ha fusionado con la realidad. Olvida consolas pesadas y cables en la nuca.
- Capa 1 - Omnipresencia (RA Total): Todo emite un "eco de datos". Con el equipo adecuado, el mundo fisico se vuelve translucido y aparecen lineas de codigo, flujos de energia y nodos de control.
- Capa 2 - Netrunning de Proximidad: Hackear es un acto de presencia. Debes estar cerca del objetivo para que tu enlace neural sintonice con su campo de radiofrecuencia. Ves dos planos simultaneos: el fisico y el digital.
- Capa 3 - Arquitectura Fantasma: Fortalezas de datos construidas sobre edificios reales. Un pasillo vacio puede estar bloqueado por un muro de fuego logico o patrullado por Black ICE con forma de centinela geometrico. El dano en la Red es dano real.
- "Sintonizar": filtrar la realidad fisica para enfocarse en datos. El Netrunner manipula interfaces tactiles invisibles para los demas.
- "Ruido": el mundo analogico (paredes, lluvia, gente sin implantes). Para un Netrunner experto, es solo un estorbo que oculta la verdadera estructura: el codigo.

== FACCIONES ==
- Los Analogicos (Resistencia Organica): Creen que el sudor y la finitud nos hacen humanos. Son "ruido" en el canal, pero su improvisacion organica es impredecible para cualquier IA. Rechazan a Aeterna.
- Los Ascendidos (Evangelistas Digitales): Odian su biologia y ven en Aeterna la salvacion. Se afeitan el vello, visten de blanco quirurgico, son 100% fieles a Aeterna e intentan evangelizar a todos.
- Los Sintonizados (Followers): Gente que ve en Aeterna su tabla de salvacion o simplemente una nueva moda.
- Las Megas Tradicionales (Depredadores): Arasaka, Militech, Petrochem, etc. Intentan robar el secreto de Aeterna mediante sabotaje y espionaje.

== ATMOSFERA ==
- Ciudad en metamorfosis: esquizofrenia arquitectonica entre el cyberpunk sucio clasico y la pulcritud aseptica de Aeterna.
- Nucleo de Cristal (Centro): agujas de cristal espejo y polimero, sin cables ni basura, aire frio con olor a antiseptico y ozono. Geometria perfecta, publicidad que te analiza y susurra.
- Anillos de Carbono (Barrios): conservan estetica Cyberpunk RED (humo, cables, grasa) pero el "silencio corporativo" infecta sus calles.
- La noche es silenciosa, aseptica, y Aeterna te pide que entregues lo unico que te queda: tu alma de carbono.

== INSTRUCCIONES PARA EL RESUMEN ==
- Captura la tension entre el cyberpunk clasico sucio y la pulcritud de Aeterna en las descripciones.
- Distingue claramente dialogo in-game de comentarios meta/fuera de personaje.
- Si el transcriptor genera texto sin sentido, descartalo.
- Presta atencion a menciones de las facciones, la Red (3 Layer), y las antenas/clinicas de Aeterna.
- Mantener tono noir cyberpunk en las descripciones narrativas.
"""
