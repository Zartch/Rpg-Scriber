language = "es"
description = "Night City, 2060. La contaminacion de la explosion de la torre Arasaka ha sido limpiada y la ciudad empieza a reconstruirse. Pero no es la vieja Night City la que resurge: Aeterna Biotics, una startup agresiva que promete inmortalidad, esta transformando la ciudad desde dentro. Su lema: \"La carne es un lastre; nosotros somos la evolucion\". Mientras las megas tradicionales luchan por no quedar obsoletas, los jugadores viven la metamorfosis de Night City hacia algo que podria ser el futuro de Cyberpunk 2077... o no."
campaign_summary = """
# Cyberpunk 2060: Nacimiento de la Perfección
## Resumen Global de Campaña

En el Night City de 2060, cuando la contaminación de la explosión de la Torre Arasaka ha sido finalmente limpiada, surge una nueva amenaza que trasciende todo lo conocido. Aeterna Biotics, una corporación que promete inmortalidad bajo el lema "La carne es un lastre; nosotros somos la evolución", está transformando la ciudad desde sus entrañas mismas.

## Arco I: El Despertar en Watson

La historia comienza en una plaza aparentemente rutinaria de Watson donde convergen destinos que parecían casuales. Elara "Nix" Navarro, fixer experta en información del Node 56, observa junto a Vektor, el netrunner de mirada analítica, y Canal, el técnico vivaracho, mientras Tira, una mercenaria europea misteriosa, vigila desde las sombras un intercambio entre un fixer y dos nómadas por un dispositivo negro.

La instalación súbita de una antena blanca de Aeterna por parte de drones inmaculados desencadena el primer "nodo de silencio": once minutos y cincuenta y seis segundos de blanco absoluto donde solo sobreviven los cuatro protagonistas, los nómadas Sena y Kael, y Tira. Durante este evento, experimentan visiones ajenas - accidentes de tráfico en Viena, explosiones en el canal de Panamá, manipulación de sistemas corporativos - que revelan estar conectados por tragedias familiares que creían inconexas.

Al despertar, la plaza se ha transformado: el metal corroído reemplazado por polímero blanco pulcro, once charcos de cristal líquido donde antes había personas, y líneas verdes conectando sus mentes en la Capa 3 de la Red. Sus barras de progreso han subido del 0% al 12%, marcándolos como objetivos de una cacería que apenas comprenden.

## Arco II: Los Secretos del Pasado

La investigación del disco robado a los nómadas revela fragmentos de información sobre "John Trash" y archivos de 2023, pero su contenido permanece cifrado. Sena, inicialmente presentada como una nómada vulnerable, se revela como alguien con conocimiento profundo sobre Aeterna y una historia dolorosa con la corporación. Advierte que el disco contiene información sobre los "orígenes" de Aeterna - su semilla europea - distribuida en eventos aparentemente inconexos.

El encuentro con Ekaterina, la mujer elegante que toca piano de madera auténtica en su mansión en las montañas de Westbrook, abre las compuertas de la verdad. Esta mecenas de la resistencia revela que Vektor, Canal y posiblemente Tira tienen conexiones históricas con Aeterna que trascienden la casualidad. La madre de Vektor co-creó software de control de tráfico que Aeterna pervirtió para asesinar a las familias de otros supervivientes, incluyendo a los Falkenberg en Viena.

Sierra, el netrunner encargado de investigar los eventos, confirma que un firewall increíblemente sofisticado - posiblemente obra de Rache Bartmoss - protegió al grupo del nodo de silencio. Las líneas verdes que los conectan no son obra de Aeterna, sino de un netrunner misterioso usando tecnología anterior al DataCrash. También revela que Ekaterina mantiene una red de más de cincuenta personas afectadas por Aeterna, incluyendo agentes infiltrados en posiciones estratégicas.

## Arco III: La Revelación Familiar

La investigación de los archivos desencadena revelaciones personales devastadoras. Canal descubre que Sena es su padre biológico, perdido durante el ataque al carguero de Gracia Biotech en 2054. Kael, que había manipulado a Sena para llegar a esta verdad, revela haber estado jugando un juego más complejo, manteniendo dos líneas de investigación - una emocional dirigida por su hermana, otra calculada por él mismo.

Vektor procesa metódicamente las conexiones: Tira es en realidad Alina Falkenberg, hija de Erik Falkenberg, el arquitecto involuntario de los primeros nodos de silencio. Su desaparición de los registros a los 16 años, sus implantes europeos, su presencia en la plaza - todo forma parte de un patrón donde Eurasia Biotechnics, Danger Gal y Aeterna tejen una red de manipulación que se extiende décadas atrás.

El encuentro violento en el búnker nómada marca un punto de ruptura: cuando la desconfianza explota en violencia física, Tira abandona el grupo para continuar su investigación en solitario, caminando hacia la noche de Pacífica con secretos que aún no ha revelado completamente.

## Arco IV: La Simulación y el Bucle

El grupo experimenta una repetición del evento de Watson, pero con diferencias cruciales que revelan la manipulación de la realidad por parte de Aeterna. Despiertan con barras de progreso al 88% y sin las líneas verdes protectoras, enfrentando un mundo donde los recuerdos de días vividos no coinciden con la realidad física presente.

Los hermanos nómadas muestran lagunas de memoria específicas - no recuerdan a Ekaterina ni a Sierra - mientras su búnker presenta una configuración diferente. Canal descubre en la libreta de Sena cálculos que revelan el "Patrón 71" y una frecuencia de comunicación específica: 56/47-16-76, correspondiente a la "comunicación blanca" de Aeterna.

## Arco V: La Red de Control

La investigación de Canal decodifica la verdadera naturaleza de la amenaza: Aeterna opera una red de civiles implantados que actúan como repetidores inconscientes de vigilancia. Jóvenes como el músico con brazo cibernético y su amigo con implantes oculares han adoptado la tecnología de Aeterna por moda, sin conocer que se han convertido en nodos de una vasta red de comunicación y control.

Tira se reúne con Elías Thorne, quien se presenta como el noveno superviviente de nodos de silencio y revela que una fracción de Aeterna busca eliminarlos para limpiar su pasado corporativo. Sin embargo, inconsistencias en su conocimiento - como fotografías de Canal generadas por IA - sugieren que el propio Thorne podría ser una recreación digital imperfecta.

El descubrimiento más alarmante llega cuando analizan los implantes de Tira: un dispositivo que abarca toda su columna vertebral, fusionado con nodos neuronales que actúan como antena de comunicación, parte del "Patrón 71" diseñado para el "genocidio silencioso" mencionado en los documentos corporativos.

## Arco VI: La Verdad Sobre la Realidad

En las profundidades de los túneles del metro de Watson, el grupo se reúne con Ekaterina para recibir la revelación más devastadora: Aeterna no opera con realidad virtual tradicional, sino con manipulación electromagnética directa del sistema nervioso. Sus antenas generan "neurodanzas brutales" que estimulan los sentidos para crear experiencias indistinguibles de la realidad, permitiendo obtener perfiles biológicos completos sin leer directamente las mentes.

La corporación busca crear una "raza superior" mediante clonación biológica mejorada cibernéticamente. Las barras de progreso indican el porcentaje de información recopilada; al alcanzar el 100%, proceden a la eliminación del original y su sustitución por el clon perfeccionado. Con el grupo al 88%, el tiempo se agota inexorablemente.

Ekaterina revela ser parte de una resistencia motivada por pérdidas personales - su familia eliminada por oponerse a Aeterna - y que grandes corporaciones como Arasaka y Militech han intentado previamente derrotar la amenaza sin éxito. SoulKiller y el Proyecto Cerberus representaron esfuerzos fallidos, mientras Rache Bartmoss fue el primero en enfrentarlos en 2024.

## Arco VII: Fragmentación y Revelaciones Finales

Las tensiones internas alcanzan su punto crítico cuando Canal abandona la reunión por incredulidad hacia las explicaciones técnicas, mientras Vektor acepta colaborar con la resistencia a cambio de contactar con el netrunner que los salvó. Tira, separada del encuentro principal, comparte un momento de vulnerabilidad con Canal, admitiendo que él es la única persona en quien puede confiar en Night City.

Las revelaciones sobre Sena completan el cuadro de horror personal: llevaba un implante de control que su madre, técnica médica nómada, extrajo quirúrgicamente antes de ser asesinada en 2057. Los fragmentos aislados que permanecen causan dolores de cabeza persistentes, mientras su escáner médico revela secretos que había mantenido ocultos sobre todo el grupo.

Kael comparte su trauma de hace seis años en Pacífica - exactamente donde ahora se encuentran las oficinas de Danger Gal - cuando fue capturado junto a otros nómadas y implantado por la fuerza. De los cuatro capturados, solo él sobrevive, cargando con la culpa del superviviente y el conocimiento de que el verdadero Elías Thorne, a quien conoce desde hace tiempo, tiene defectos físicos específicos ausentes en el impostor que contactó a Tira y Canal.

## El Estado Actual

Al finalizar la campaña, Night City se encuentra en plena transformación bajo el polímero blanco de Aeterna. El Centro Corporativo resplandece con agujas de cristal aséptico mientras los barrios conservan vestigios del cyberpunk clásico, pero el "silencio corporativo" infecta cada esquina. Las antenas blancas proyectan su influencia invisible, convirtiendo ciudadanos en repetidores de una red de control electromagnético.

El Node 56 se encuentra fracturado: Vektor comprometido con la resistencia de Ekaterina, Nix recopilando inteligencia estratégica, Canal navegando entre el escepticismo técnico y la lealtad personal, y Tira operando en solitario con secretos que aún no ha compartido completamente. Los hermanos nómadas permanecen como aliados inciertos, cargando con traumas familiares y fragmentos de memoria manipulados.

Las líneas entre realidad y simulación se han difuminado completamente. La experiencia final en los túneles del metro termina con distorsiones holográficas que ponen en duda la naturaleza misma de su realidad, mientras las barras de progreso al 88% marcan el tiempo restante antes de que Aeterna complete su recopilación de datos y proceda a la fase final de sustitución.

En las calles silenciosas donde el carbón se transmuta en cristal y el ruido en silencio aséptico, los supervivientes del Node 56 se enfrentan a una verdad inexorable: son piezas en un tablero jugado por una inteligencia que trasciende las limitaciones humanas, en una guerra donde la propia definición de humanidad está en juego. La evolución prometida por Aeterna podría ser el futuro de Night City hacia 2077... o podría ser algo completamente diferente, algo que redefina la naturaleza misma de la existencia en un mundo donde la carne se considera un lastre y la perfección digital se presenta como la única salvación.
"""

