<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPG Scribe</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>RPG Scribe</h1>
    <span id="connection-badge" class="badge badge-idle">Disconnected</span>
  </header>

  <!-- Campaign info bar -->
  <section id="campaign-bar" class="panel campaign-bar hidden">
    <div class="campaign-display" id="campaign-display">
      <div class="campaign-info">
        <span class="campaign-label">Campaign:</span>
        <strong id="campaign-name">—</strong>
        <span class="campaign-meta" id="campaign-system"></span>
      </div>
      <button id="campaign-edit-btn" class="btn-small" title="Edit campaign">Edit</button>
    </div>
    <form id="campaign-edit-form" class="campaign-edit hidden">
      <div class="edit-row">
        <label>Name</label>
        <input type="text" id="edit-campaign-name" required />
      </div>
      <div class="edit-row">
        <label>System</label>
        <input type="text" id="edit-campaign-system" placeholder="e.g. Akelarre, D&D 5e" />
      </div>
      <div class="edit-row">
        <label>Description</label>
        <textarea id="edit-campaign-desc" rows="2" placeholder="Campaign description..."></textarea>
      </div>
      <div class="edit-row">
        <label>Instructions</label>
        <textarea id="edit-campaign-instructions" rows="2" placeholder="Custom instructions for the summarizer..."></textarea>
      </div>
      <div class="edit-actions">
        <button type="submit" class="btn-small btn-save">Save</button>
        <button type="button" id="campaign-edit-cancel" class="btn-small btn-cancel">Cancel</button>
      </div>
    </form>
  </section>

  <main class="main-layout">
    <!-- Session sidebar -->
    <aside id="session-sidebar" class="panel sidebar">
      <h2>Sessions</h2>
      <button id="back-to-live" class="btn-live hidden">Back to Live</button>
      <div id="session-list" class="session-list">
        <p class="placeholder">No sessions loaded.</p>
      </div>
    </aside>

    <div class="main-content">
      <!-- Status panel -->
      <section id="status-panel" class="panel">
        <h2>System Status</h2>
        <div id="component-status" class="status-grid">
          <div class="status-card" data-component="listener">
            <span class="status-dot idle"></span>
            <strong>Listener</strong>
            <span class="status-msg">idle</span>
          </div>
          <div class="status-card" data-component="transcriber">
            <span class="status-dot idle"></span>
            <strong>Transcriber</strong>
            <span class="status-msg">idle</span>
          </div>
          <div class="status-card" data-component="summarizer">
            <span class="status-dot idle"></span>
            <strong>Summarizer</strong>
            <span class="status-msg">idle</span>
          </div>
        </div>
      </section>

      <div class="columns">
        <!-- Live transcription -->
        <section id="transcription-panel" class="panel">
          <h2>Live Transcription</h2>
          <div id="transcription-feed" class="feed"></div>
        </section>

        <!-- Live summary -->
        <section id="summary-panel" class="panel">
          <h2>Session Summary</h2>
          <div id="session-summary" class="summary-content">
            <p class="placeholder">Waiting for summary updates&hellip;</p>
          </div>
          <h3>Campaign Summary</h3>
          <div id="campaign-summary" class="summary-content">
            <p class="placeholder">No campaign summary yet.</p>
          </div>
        </section>
      </div>

      <!-- Questions panel -->
      <section id="questions-panel" class="panel">
        <h2>Pending Questions</h2>
        <div id="questions-list" class="questions">
          <p class="placeholder">No pending questions.</p>
        </div>
      </section>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
