<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPG Scribe — Campaign Summaries</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .cs-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 1rem;
      max-width: 1200px;
      margin: 1rem auto;
      padding: 0 1rem;
    }
    .cs-sidebar { display: flex; flex-direction: column; gap: 0.5rem; }
    .cs-sidebar h2 { margin: 0 0 0.75rem; font-size: 1rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.05em; }
    .cs-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.6rem 0.85rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .cs-item:hover, .cs-item.active {
      border-color: var(--accent);
      background: rgba(124, 106, 240, 0.08);
    }
    .cs-item-date { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem; }
    .cs-item-sessions { font-size: 0.72rem; color: var(--text-muted); }
    .cs-item-preview { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.3rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cs-badge-latest {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--accent);
      color: #fff;
      margin-left: 0.4rem;
      vertical-align: middle;
      text-transform: uppercase;
    }
    .cs-content { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; }
    .cs-content-header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .cs-content-header h2 { margin: 0; font-size: 1.1rem; }
    .cs-content-meta { font-size: 0.8rem; color: var(--text-muted); }
    .cs-body { white-space: pre-wrap; font-size: 0.9rem; line-height: 1.7; color: var(--text-primary); }
    .cs-placeholder { color: var(--text-muted); font-style: italic; }
    .cs-empty { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
    @media (max-width: 700px) {
      .cs-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>RPG Scribe</h1>
    <a href="/" class="btn-small" style="text-decoration:none">&#8592; Back</a>
  </header>

  <div class="cs-layout">
    <aside class="cs-sidebar">
      <h2>Campaign Summaries</h2>
      <div id="summary-list">
        <p class="cs-placeholder">Loading&hellip;</p>
      </div>
    </aside>

    <main class="cs-content">
      <div id="summary-view">
        <p class="cs-placeholder">Select a summary from the list.</p>
      </div>
    </main>
  </div>

  <script>
  (function () {
    "use strict";

    var summaryList = document.getElementById("summary-list");
    var summaryView = document.getElementById("summary-view");

    var campaignId = new URLSearchParams(location.search).get("campaign");
    if (!campaignId) {
      summaryList.innerHTML = '<p class="cs-placeholder">No campaign specified.</p>';
      return;
    }

    var summaries = [];

    function formatDate(ts) {
      if (!ts) return "—";
      return new Date(ts * 1000).toLocaleString([], {
        year: "numeric", month: "short", day: "numeric",
        hour: "2-digit", minute: "2-digit"
      });
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function renderList(items) {
      if (!items.length) {
        summaryList.innerHTML = '<p class="cs-placeholder">No campaign summaries yet.<br>They are generated automatically when a session ends.</p>';
        return;
      }
      var html = "";
      items.forEach(function (item, i) {
        var isLatest = i === 0;
        html += '<div class="cs-item' + (isLatest ? ' active' : '') + '" data-id="' + escHtml(item.id) + '">';
        html += '<div class="cs-item-date">' + escHtml(formatDate(item.generated_at));
        if (isLatest) html += '<span class="cs-badge-latest">latest</span>';
        html += '</div>';
        html += '<div class="cs-item-sessions">' + (item.session_count || 0) + ' session(s)</div>';
        if (item.preview) {
          html += '<div class="cs-item-preview">' + escHtml(item.preview) + '</div>';
        }
        html += '</div>';
      });
      summaryList.innerHTML = html;

      summaryList.querySelectorAll(".cs-item").forEach(function (el) {
        el.addEventListener("click", function () {
          summaryList.querySelectorAll(".cs-item").forEach(function (x) { x.classList.remove("active"); });
          el.classList.add("active");
          loadSummary(el.dataset.id);
        });
      });
    }

    function renderSummary(item) {
      if (!item) {
        summaryView.innerHTML = '<p class="cs-placeholder">Summary not found.</p>';
        return;
      }
      var html = '<div class="cs-content-header">';
      html += '<h2>Campaign Summary</h2>';
      html += '<span class="cs-content-meta">Generated: ' + escHtml(formatDate(item.generated_at)) + '</span>';
      html += '<span class="cs-content-meta">Sessions: ' + (item.session_count || 0) + '</span>';
      if (item.trigger_session_id) {
        html += '<span class="cs-content-meta">After session: ' + escHtml(item.trigger_session_id) + '</span>';
      }
      html += '</div>';
      html += '<div class="cs-body">' + escHtml(item.content || "") + '</div>';
      summaryView.innerHTML = html;
    }

    function loadSummary(id) {
      summaryView.innerHTML = '<p class="cs-placeholder">Loading&hellip;</p>';
      fetch("/api/campaigns/" + encodeURIComponent(campaignId) + "/campaign-summaries/" + encodeURIComponent(id))
        .then(function (r) { return r.json(); })
        .then(function (data) { renderSummary(data.campaign_summary); })
        .catch(function () {
          summaryView.innerHTML = '<p class="cs-placeholder">Failed to load summary.</p>';
        });
    }

    // Initial load
    fetch("/api/campaigns/" + encodeURIComponent(campaignId) + "/campaign-summaries")
      .then(function (r) { return r.json(); })
      .then(function (data) {
        summaries = data.campaign_summaries || [];
        renderList(summaries);
        if (summaries.length) {
          loadSummary(summaries[0].id);
        }
      })
      .catch(function () {
        summaryList.innerHTML = '<p class="cs-placeholder">Failed to load summaries.</p>';
      });
  })();
  </script>
</body>
</html>
